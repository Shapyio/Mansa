services:

  # ---------------------------
  # FastAPI API Service
  # ---------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mansa_api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/app:/app/app
      - ./backend/core:/app/core
    env_file:
      - ./secrets.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/stockdb
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy # ← waits for pg_isready to pass
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # ---------------------------
  # Background Worker
  # ---------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mansa_worker
    command: python workers/worker.py
    volumes:
      - ./backend/core:/app/core
      - ./backend/workers:/app/workers
      - ./backend/jobs:/app/jobs
    env_file:
      - ./secrets.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/stockdb
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # ---------------------------
  # React Frontend
  # ---------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mansa_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173" # For vite
    depends_on:
      - api

  # ---------------------------
  # Redis (Job Queue / Cache)
  # ---------------------------
  redis:
    image: redis:7
    container_name: mansa_redis
    ports:
      - "6379:6379"

  # ---------------------------
  # TimescaleDB
  # ---------------------------
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: mansa_db
    environment:
      POSTGRES_DB: stockdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init-timescaledb.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stockdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
